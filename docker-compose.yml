services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=change-this-in-production
      - DATABASE_URL=sqlite:////app/instance/messaging.db
    volumes:
      - messaging_data:/app/instance
      - messaging_uploads:/app/uploads
volumes:
  messaging_data:
  messaging_uploads:

