{% extends "base.html" %}

{% block content %}

<div class="page-heading mb-4">
    <h1 class="h3 fw-bold mb-1">
        پیام جدید
    </h1>

    <p class="text-secondary mb-0">
        پیام را برای یکی از کاربران ثبت‌شده ارسال کنید.
    </p>
</div>

<div class="content-card form-card">

    {% if users %}

    <form method="POST" enctype="multipart/form-data">

        <!-- انتخاب گیرنده -->
        <div class="mb-3">
            <label class="form-label">
                گیرنده
            </label>

            <select class="form-select"
                    name="receiver_id"
                    required>

                <option value="">
                    انتخاب کنید
                </option>

                {% for user in users %}
                    <option value="{{ user.id }}">
                        {{ user.username }} — {{ user.email }}
                    </option>
                {% endfor %}

            </select>
        </div>

        <!-- موضوع -->
        <div class="mb-3">

            <label class="form-label">
                موضوع
            </label>

            <input
                type="text"
                class="form-control"
                name="subject"
                maxlength="150"
                required>

        </div>

        <!-- متن پیام -->
        <div class="mb-3">

            <label class="form-label">
                متن پیام
            </label>

            <textarea
                class="form-control"
                name="body"
                rows="8"
                required>
            </textarea>

        </div>

        <!-- فایل پیوست -->
        <div class="mb-4">

            <label class="form-label">
                فایل پیوست
                <span class="text-secondary fw-normal">
                    (اختیاری - حداکثر 8 مگابایت)
                </span>
            </label>

            <input
                type="file"
                class="form-control"
                name="attachment"
                accept=".pdf,.png,.jpg,.jpeg,.doc,.docx,.txt,.zip">

            <div class="form-text">
                فرمت‌های مجاز:
                PDF، JPG، PNG، DOC، DOCX، TXT و ZIP
            </div>

        </div>

        <!-- دکمه‌ها -->
        <div class="d-flex gap-2">

            <button type="submit" class="btn btn-primary px-4">
                ارسال پیام
            </button>

            <a href="{{ url_for('dashboard') }}"
               class="btn btn-light">
                انصراف
            </a>

        </div>

    </form>

    {% else %}

    <div class="empty-state">
        برای ارسال پیام باید حداقل یک کاربر دیگر ثبت‌نام کرده باشد.
    </div>

    {% endif %}

</div>

{% endblock %}
